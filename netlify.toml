# HabitPup / Habiganize — Netlify frontend deploy (WEB only — not habit-mobile)
# API host: habiganize-api.onrender.com
#
# CRITICAL — Netlify UI Site settings must match this file (UI overrides TOML):
#   Base directory:     (empty / repo root)
#   Package directory:  (empty / repo root)  ← never artifacts/habit-mobile
#   Build command:      from [build] below
#   Publish directory:  from [build] below
#
# Required env var in Netlify UI (production needs LIVE key):
#   VITE_CLERK_PUBLISHABLE_KEY=pk_live_...  (must match CLERK_PUBLISHABLE_KEY)
# Also finish Clerk custom-domain DNS for clerk.habitganizer.tech, or remove the
# custom domain in Clerk and use the default Frontend API host.

[build]
  command = "pnpm install --frozen-lockfile && pnpm --filter @workspace/habit-tracker run build"
  publish = "artifacts/habit-tracker/dist/public"

[build.environment]
  NODE_VERSION = "20"
  # Netlify uses packageManager from root package.json (pnpm)

# Proxy API + legal pages to the Express host (same-origin for the browser).
[[redirects]]
  from = "/api/*"
  to = "https://habiganize-api.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/privacy"
  to = "https://habiganize-api.onrender.com/privacy"
  status = 200
  force = true

[[redirects]]
  from = "/support"
  to = "https://habiganize-api.onrender.com/support"
  status = 200
  force = true

# SPA client-side routes (wouter) — must be last.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security / cache headers for static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
