<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HabitFlow</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div id="root">
      <header class="header">
        <div class="brand">
          <div class="logo">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="12 2 15 8.5 22 9.3 17 14 18.5 21 12 17.7 5.5 21 7 14 2 9.3 9 8.5 12 2" />
            </svg>
          </div>
          <span class="brand-name">HABITFLOW</span>
        </div>
        <button id="settings-btn" class="icon-btn" title="Settings" aria-label="Settings">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3" />
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h0a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h0a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
          </svg>
        </button>
      </header>

      <section class="hero" id="hero">
        <div class="hero-text">
          <div class="hero-label" id="hero-label">PROGRESS</div>
          <div class="hero-number" id="hero-number">—</div>
        </div>
        <div class="hero-icon" id="hero-icon">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
          </svg>
        </div>
      </section>

      <main id="content" class="content">
        <div class="loading" id="loading">
          <div class="spinner"></div>
        </div>
      </main>

      <div id="settings-panel" class="settings-panel hidden">
        <h3>API URL</h3>
        <p class="hint">Where your HabitFlow server is running.</p>
        <input
          type="text"
          id="api-url-input"
          placeholder="https://your-app.replit.app"
          autocomplete="off"
          spellcheck="false"
        />
        <div class="settings-actions">
          <button id="cancel-settings" class="btn btn-ghost">CANCEL</button>
          <button id="save-settings" class="btn btn-yellow">SAVE</button>
        </div>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
